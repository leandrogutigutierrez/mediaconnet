<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="gGreen" cx="30%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#00E676" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00E676" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gTeal" cx="75%" cy="65%" r="50%">
      <stop offset="0%" stop-color="#00B8D4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00B8D4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background blobs -->
  <rect width="1440" height="900" fill="#05090C"/>
  <ellipse cx="420" cy="380" rx="520" ry="380" fill="url(#gGreen)"/>
  <ellipse cx="1080" cy="580" rx="460" ry="320" fill="url(#gTeal)"/>

  <!-- Wave lines — green -->
  <g fill="none" stroke-linecap="round">
    <path d="M-50 480 C 200 320, 400 620, 650 400 S 1000 180, 1200 380 S 1400 560, 1500 440"
          stroke="#00E676" stroke-width="1.2" opacity="0.55"/>
    <path d="M-50 510 C 200 350, 400 650, 650 430 S 1000 210, 1200 410 S 1400 590, 1500 470"
          stroke="#00E676" stroke-width="0.8" opacity="0.35"/>
    <path d="M-50 540 C 200 380, 400 680, 650 460 S 1000 240, 1200 440 S 1400 620, 1500 500"
          stroke="#00E676" stroke-width="0.5" opacity="0.20"/>

    <path d="M-50 300 C 180 180, 380 480, 620 260 S 950 60,  1150 240 S 1380 420, 1500 280"
          stroke="#00E676" stroke-width="1.0" opacity="0.40"/>
    <path d="M-50 330 C 180 210, 380 510, 620 290 S 950 90,  1150 270 S 1380 450, 1500 310"
          stroke="#00E676" stroke-width="0.6" opacity="0.25"/>

    <path d="M-50 650 C 220 500, 440 760, 680 560 S 1020 320, 1240 520 S 1440 680, 1500 580"
          stroke="#00E676" stroke-width="0.9" opacity="0.30"/>
    <path d="M-50 680 C 220 530, 440 790, 680 590 S 1020 350, 1240 550 S 1440 710, 1500 610"
          stroke="#00E676" stroke-width="0.5" opacity="0.18"/>

    <!-- Teal waves -->
    <path d="M-50 420 C 250 260, 500 560, 750 360 S 1100 120, 1300 320 S 1480 500, 1500 400"
          stroke="#00B8D4" stroke-width="1.1" opacity="0.40"/>
    <path d="M-50 450 C 250 290, 500 590, 750 390 S 1100 150, 1300 350 S 1480 530, 1500 430"
          stroke="#00B8D4" stroke-width="0.7" opacity="0.25"/>
    <path d="M-50 600 C 260 440, 520 700, 760 500 S 1110 260, 1320 460 S 1490 620, 1500 540"
          stroke="#00B8D4" stroke-width="0.8" opacity="0.22"/>

    <!-- Faint far waves -->
    <path d="M-50 180 C 200 80,  420 320, 660 140 S 980  -40, 1180 140 S 1400 300, 1500 180"
          stroke="#00E676" stroke-width="0.5" opacity="0.15"/>
    <path d="M-50 780 C 230 640, 480 860, 720 680 S 1060 460, 1280 660 S 1460 800, 1500 730"
          stroke="#00B8D4" stroke-width="0.5" opacity="0.15"/>
  </g>

  <!-- Tiny glowing dots at intersections -->
  <circle cx="650"  cy="400" r="2.5" fill="#00E676" opacity="0.6"/>
  <circle cx="1200" cy="380" r="2"   fill="#00E676" opacity="0.5"/>
  <circle cx="420"  cy="300" r="2"   fill="#00B8D4" opacity="0.5"/>
  <circle cx="970"  cy="560" r="2.5" fill="#00B8D4" opacity="0.55"/>
  <circle cx="200"  cy="650" r="1.8" fill="#00E676" opacity="0.4"/>
  <circle cx="1350" cy="250" r="1.8" fill="#00E676" opacity="0.4"/>
</svg>
