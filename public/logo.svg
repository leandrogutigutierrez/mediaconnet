<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 52" fill="none">
  <defs>
    <linearGradient id="bgG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00205B"/>
      <stop offset="100%" stop-color="#001440"/>
    </linearGradient>
    <linearGradient id="goldG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD050"/>
      <stop offset="100%" stop-color="#F5B800"/>
    </linearGradient>
    <linearGradient id="blueN" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="cb"/>
      <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="1.8" result="cb"/>
      <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Icon badge (46×46 centered in 52px tall) ── -->
  <circle cx="26" cy="26" r="23" fill="url(#bgG)"/>

  <!-- Outer hex ring -->
  <polygon
    points="26,8 38.7,15 38.7,29 26,36 13.3,29 13.3,15"
    fill="none" stroke="#1A5FA8" stroke-width="0.7" opacity="0.35"/>

  <!-- Spokes -->
  <line x1="26" y1="26" x2="26" y2="9"    stroke="#1976D2" stroke-width="1.2" opacity="0.55"/>
  <line x1="26" y1="26" x2="37.9" y2="15.5" stroke="#1976D2" stroke-width="1.2" opacity="0.55"/>
  <line x1="26" y1="26" x2="37.9" y2="30"   stroke="#1976D2" stroke-width="1.2" opacity="0.55"/>
  <line x1="26" y1="26" x2="26" y2="38"   stroke="#1976D2" stroke-width="1.2" opacity="0.55"/>
  <line x1="26" y1="26" x2="14.1" y2="30"   stroke="#1976D2" stroke-width="1.2" opacity="0.55"/>
  <line x1="26" y1="26" x2="14.1" y2="15.5" stroke="#1976D2" stroke-width="1.2" opacity="0.55"/>

  <!-- Outer nodes -->
  <circle cx="26"  cy="9"    r="3" fill="url(#blueN)" filter="url(#glow)"/>
  <circle cx="37.9" cy="15.5" r="3" fill="url(#blueN)" filter="url(#glow)"/>
  <circle cx="37.9" cy="30"   r="3" fill="url(#blueN)" filter="url(#glow)"/>
  <circle cx="26"  cy="38"   r="3" fill="url(#blueN)" filter="url(#glow)"/>
  <circle cx="14.1" cy="30"   r="3" fill="url(#blueN)" filter="url(#glow)"/>
  <circle cx="14.1" cy="15.5" r="3" fill="url(#blueN)" filter="url(#glow)"/>

  <!-- Center gold hub -->
  <circle cx="26" cy="26" r="6.5" fill="url(#goldG)" filter="url(#goldGlow)" opacity="0.85"/>
  <circle cx="26" cy="26" r="4"   fill="#FFD050"/>
  <circle cx="26" cy="26" r="1.8" fill="#FFF8DC" opacity="0.9"/>

  <!-- ── Wordmark ── -->
  <!-- "Media" white bold -->
  <text
    x="60" y="31"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="22" font-weight="700" letter-spacing="-0.3"
    fill="#EFF6FF">Media</text>

  <!-- "Connet" USC gold -->
  <text
    x="124" y="31"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="22" font-weight="700" letter-spacing="-0.3"
    fill="#F5B800">Connet</text>

  <!-- USC tagline -->
  <text
    x="61" y="43"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="7.5" font-weight="500" letter-spacing="1.4"
    fill="#6B8BAE">UNIVERSIDAD SANTIAGO DE CALI</text>
</svg>
