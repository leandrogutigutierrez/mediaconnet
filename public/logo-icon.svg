<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00205B"/>
      <stop offset="100%" stop-color="#001440"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD050"/>
      <stop offset="100%" stop-color="#F5B800"/>
    </linearGradient>
    <linearGradient id="blueNodeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="24" cy="24" r="24" fill="url(#bgGrad)"/>

  <!-- Outer hexagon ring (subtle) -->
  <polygon
    points="24,7.5 37.6,15.75 37.6,32.25 24,40.5 10.4,32.25 10.4,15.75"
    fill="none" stroke="#1A5FA8" stroke-width="0.8" opacity="0.35"/>

  <!-- Connection lines: center to outer nodes -->
  <line x1="24" y1="24" x2="24" y2="9"   stroke="#1976D2" stroke-width="1.4" opacity="0.55"/>
  <line x1="24" y1="24" x2="37" y2="16.5" stroke="#1976D2" stroke-width="1.4" opacity="0.55"/>
  <line x1="24" y1="24" x2="37" y2="31.5" stroke="#1976D2" stroke-width="1.4" opacity="0.55"/>
  <line x1="24" y1="24" x2="24" y2="39"  stroke="#1976D2" stroke-width="1.4" opacity="0.55"/>
  <line x1="24" y1="24" x2="11" y2="31.5" stroke="#1976D2" stroke-width="1.4" opacity="0.55"/>
  <line x1="24" y1="24" x2="11" y2="16.5" stroke="#1976D2" stroke-width="1.4" opacity="0.55"/>

  <!-- Outer nodes (blue, with glow) -->
  <circle cx="24"  cy="9"    r="3.5" fill="url(#blueNodeGrad)" filter="url(#glow)"/>
  <circle cx="37"  cy="16.5" r="3.5" fill="url(#blueNodeGrad)" filter="url(#glow)"/>
  <circle cx="37"  cy="31.5" r="3.5" fill="url(#blueNodeGrad)" filter="url(#glow)"/>
  <circle cx="24"  cy="39"   r="3.5" fill="url(#blueNodeGrad)" filter="url(#glow)"/>
  <circle cx="11"  cy="31.5" r="3.5" fill="url(#blueNodeGrad)" filter="url(#glow)"/>
  <circle cx="11"  cy="16.5" r="3.5" fill="url(#blueNodeGrad)" filter="url(#glow)"/>

  <!-- Center hub node (USC Gold) -->
  <circle cx="24" cy="24" r="7"   fill="url(#goldGrad)" filter="url(#goldGlow)" opacity="0.9"/>
  <circle cx="24" cy="24" r="4.5" fill="#FFD050"/>
  <circle cx="24" cy="24" r="2.2" fill="#FFF8DC" opacity="0.9"/>
</svg>
